# Hydra config loaded directly by python main.py
defaults:
  - config
  - override experiment: exp_latent_dyn
  - override dataset: arx5_h5_dataset
  - override algorithm: latent_world_model
  - _self_

name: stage2_front_cam

wandb:
  entity: pravsels
  project: interactive_world_sim
  mode: offline

dataset:
  # h5_path is injected at submit time by slurm script (WAN_H5_PATH -> dataset.h5_path).
  # Camera convention: camera_0_color = wrist, camera_1_color = front.
  # stats_json_path is injected at submit time by slurm script.
  stats_json_path: /mnt/wan_dataset_stats.json
  horizon: 10
  val_horizon: 200
  obs_keys: [camera_1_color]

experiment:
  training:
    precision: 16-mixed
    batch_size: 32
    max_steps: 1000005
    log_every_n_steps: 100
    data:
      num_workers: 4
    checkpointing:
      # Daily walltime on Isambard; checkpoint often enough to resume safely.
      every_n_train_steps: 10000
  validation:
    limit_batch: 1.0
    batch_size: 2
    val_every_n_step: 30000
    data:
      num_workers: 4

algorithm:
  latent_dim: 512
  action_dim: 7
  training_stage: 2
  val_render: False
  # Stage-2 defaults from repo training guidance.
  sampling_strategy: terminal_only
  noise_scheduler:
    loss_weighting: uniform
  # Stage-1 checkpoint to initialize encoder/decoder and conditioning stack.
  # Use container-visible outputs path (host scratch outputs is bind-mounted to /workspace/outputs).
  load_ae: /workspace/outputs/2026-03-13/10-25-30/checkpoints/epoch=0-step=64000.ckpt

# For stage-2 fresh start, keep this null.
# Resume by setting `load` to a stage-2 checkpoint path.
load: null
